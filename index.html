<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🎮 Tic Tac Toe</h1>

    <!-- Player Names -->
    <div class="players">
      <label>Player 1 (O): <input type="text" id="player1" placeholder="Enter Name"></label>
      <label>Player 2 (X): <input type="text" id="player2" placeholder="Enter Name"></label>
    </div>

    <!-- Game start message -->
    <h2 id="gameStatus" class="status">Press a box to start the game</h2>

    <!-- Timer -->
    <h2 class="timer">
      ⏰ Time: <span id="timer">0</span> sec
    </h2>

    <!-- Game Again Button -->
    <button id="newGame" class="btn">Game Again</button>

    <!-- Winner Message -->
    <div class="msg-container hide">
      <p id="msg"></p>
    </div>

    <!-- Game Board -->
    <div class="game">
      <button class="box"></button>
      <button class="box"></button>
      <button class="box"></button>

      <button class="box"></button>
      <button class="box"></button>
      <button class="box"></button>

      <button class="box"></button>
      <button class="box"></button>
      <button class="box"></button>
    </div>

    <!-- Reset Button -->
    <button id="reset" class="btn reset-btn">Reset Game</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
